<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Open Obsidian Link</title>

<script>

function openObsidian(){

  let path = window.location.pathname;

  // quitar el prefijo del repositorio
  path = path.replace("/open-obsidian/","");

  let query = window.location.search;

  let url = decodeURIComponent(path + query);

  if(!url.startsWith("obsidian://")){
    document.body.innerHTML = "<h2>El enlace no es válido</h2>";
    return;
  }

  window.location.href = url;

}

window.onload = openObsidian;

</script>

</head>

<body style="font-family:Arial;text-align:center;margin-top:80px">

<h2>Abriendo Obsidian...</h2>

</body>
</html>
